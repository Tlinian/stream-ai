name: Bug Report
description: 报告一个 bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题，请填写以下信息帮助我们定位。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述这个 bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: |
        1. 进入 '...'
        2. 点击 '....'
        3. 滚动到 '....'
        4. 出现错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境信息
      description: JDK 版本 / OS / 其他相关版本
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志输出
      description: 粘贴相关日志（如有）
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他上下文信息
